apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "passmower.fullname" . }}
  labels:
    {{- include "passmower.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "passmower.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "passmower.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "passmower.fullname" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.Version }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 9090
              name: metrics
          env:
            - name: ISSUER_URL
              value: {{ include "passmower.url" . }}
            - name: DEPLOYMENT_NAME
              value: {{ .Chart.Name }}
            {{- /* Optional string settings: only emit when set & non-empty so a
                   commented-out/empty value falls back to the app default
                   instead of being forced to "" (#67). Booleans are always
                   emitted because `false` is meaningful. */}}
            {{- with .Values.passmower.group_prefix }}
            - name: GROUP_PREFIX
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.passmower.admin_group }}
            - name: ADMIN_GROUP
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.passmower.required_group }}
            - name: REQUIRED_GROUP
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.passmower.github_organization }}
            - name: GITHUB_ORGANIZATION
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.passmower.username_source }}
            - name: USERNAME_SOURCE
              value: {{ . | quote }}
            {{- end }}
            - name: ENROLL_USERS
              value: {{ .Values.passmower.enroll_users | quote }}
            - name: DISABLE_FRONTEND_EDIT
              value: {{ .Values.passmower.disable_frontend_edit | quote }}
            {{- with .Values.passmower.namespace_selector }}
            - name: NAMESPACE_SELECTOR
              value: {{ . | quote }}
            {{- end }}
            {{- with .Values.passmower.preferred_email_domain }}
            - name: PREFERRED_EMAIL_DOMAIN
              value: {{ . | quote }}
            {{- end }}
            - name: NORMALIZE_EMAIL_ADDRESSES
              value: {{ .Values.passmower.normalize_email_addresses | quote }}
            - name: WEBAUTHN_ENABLED
              value: {{ .Values.passmower.webauthn_enabled | quote }}
            - name: GITHUB_ENABLED
              value: {{ .Values.passmower.github_enabled | quote }}
            - name: EMAIL_ENABLED
              value: {{ .Values.passmower.email_enabled | quote }}
            - name: OIDC_PROVIDERS
              value: {{ .Values.passmower.oidcProviders | default list | toJson | quote }}
            - name: REDIS_IP_FAMILY
              value: {{ .Values.redis.ipFamily | default "0" | quote }}
            - name: REDIS_URI
              {{- if .Values.redis.internal.enabled }}
              value: redis://redis.{{ .Release.Namespace }}.svc.cluster.local
              {{- end }}
              {{- if .Values.redis.redisClaim.enabled }}
              valueFrom:
                secretKeyRef:
                  name: redis-{{ include "passmower.fullname" . }}-owner-secret
                  key: REDIS_MASTER_0_URI
              {{- end }}
              {{- if .Values.redis.external.enabled }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.external.secretKeyRef.name }}
                  key: {{ .Values.redis.external.secretKeyRef.key }}
              {{- end }}
          envFrom:
            - secretRef:
                name: oidc-keys
            {{- if .Values.passmower.email_credentials_secretRef }}
            - secretRef:
                name: {{ .Values.passmower.email_credentials_secretRef }}
            {{- end }}
            {{- if .Values.passmower.github_client_secretRef }}
            - secretRef:
                name: {{ .Values.passmower.github_client_secretRef }}
            {{- end }}
            {{- /* One secretRef per distinct OIDC provider credentials secret. */}}
            {{- $seen := dict }}
            {{- range .Values.passmower.oidcProviders }}
            {{- if and .clientSecretRef (not (hasKey $seen .clientSecretRef)) }}
            {{- $_ := set $seen .clientSecretRef true }}
            - secretRef:
                name: {{ .clientSecretRef }}
            {{- end }}
            {{- end }}
            {{- if .Values.passmower.slack_client_secretRef }}
            - secretRef:
                name: {{ .Values.passmower.slack_client_secretRef }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /.well-known/openid-configuration
              port: 3000
              httpHeaders:
                - name: x-forwarded-for # suppress oidc-provider warning
                  value: {{ include "passmower.url" . }}
                - name: x-forwarded-proto # suppress oidc-provider warning
                  value: https
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
              httpHeaders:
                - name: x-forwarded-for # suppress oidc-provider warning
                  value: {{ include "passmower.url" . }}
                - name: x-forwarded-proto # suppress oidc-provider warning
                  value: https
            initialDelaySeconds: 10
            timeoutSeconds: 10
            periodSeconds: 30
          volumeMounts:
            - mountPath: /app/tos
              name: tos
            - mountPath: /app/approval
              name: approval
            - mountPath: /app/disable_frontend_edit
              name: disable-frontend-edit
            - mountPath: /app/src/views/custom/emails
              name: email-templates
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: tos
          configMap:
            {{- if .Values.passmower.texts.terms_of_service.configMapRef }}
            name: {{ .Values.passmower.texts.terms_of_service.configMapRef.name }}
            {{- else }}
            name: {{ include "passmower.fullname" . }}-tos
            {{- end }}
        - name: approval
          configMap:
            {{- if .Values.passmower.texts.approval.configMapRef }}
            name: {{ .Values.passmower.texts.approval.configMapRef.name }}
            {{- else }}
            name: {{ include "passmower.fullname" . }}-approval
            {{- end }}
        - name: disable-frontend-edit
          configMap:
            {{- if .Values.passmower.texts.disable_frontend_edit.configMapRef }}
            name: {{ .Values.passmower.texts.disable_frontend_edit.configMapRef.name }}
            {{- else }}
            name: {{ include "passmower.fullname" . }}-disable-frontend-edit
            {{- end }}
        - name: email-templates
          configMap:
            {{- if .Values.passmower.texts.emails.configMapRef }}
            name: {{ .Values.passmower.texts.emails.configMapRef.name }}
            {{- else }}
            name: {{ include "passmower.fullname" . }}-email-templates
            {{- end }}
