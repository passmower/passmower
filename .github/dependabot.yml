# Dependabot version updates
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  # Backend (root package.json)
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      backend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Frontend app
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      frontend-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Styles (Sass) build
  - package-ecosystem: "npm"
    directory: "/styles"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      styles-minor-patch:
        update-types:
          - "minor"
          - "patch"

  # Container base images (Dockerfile)
  - package-ecosystem: "docker"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"

  # GitHub Actions used by the workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "weekly"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
